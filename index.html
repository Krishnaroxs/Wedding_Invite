<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jatin & Pahuni Wedding Invitation</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel standalone for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f1225;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useEffect, useRef, useState } = React;

        // Custom Hook for Scroll Reveal
        const useScrollReveal = (threshold = 0.1) => {
          const [isVisible, setIsVisible] = useState(false);
          const ref = useRef(null);

          useEffect(() => {
            const observer = new IntersectionObserver(
              ([entry]) => {
                if (entry.isIntersecting) {
                  setIsVisible(true);
                }
              },
              { threshold }
            );
            if (ref.current) observer.observe(ref.current);
            return () => {
              if (ref.current) observer.unobserve(ref.current);
            };
          }, [threshold]);

          return [ref, isVisible];
        };

        // Canvas Background Component for 3D Floating Lanterns
        const LanternCanvas = () => {
          const canvasRef = useRef(null);

          useEffect(() => {
            const canvas = canvasRef.current;
            const ctx = canvas.getContext('2d');
            let animationFrameId;
            let lanterns = [];
            let fireflies = [];

            // Resize handler
            const resizeCanvas = () => {
              canvas.width = window.innerWidth;
              canvas.height = window.innerHeight;
            };
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();

            // Lantern Class
            class Lantern {
              constructor() {
                this.reset();
                this.y = Math.random() * canvas.height * 2; // Initial random spawn across extended height
              }

              reset() {
                this.x = Math.random() * canvas.width;
                this.z = Math.random() * 0.8 + 0.2; // Depth (0.2 to 1.0)
                this.size = (Math.random() * 15 + 10) * this.z;
                this.speedY = (Math.random() * 0.5 + 0.5) * this.z;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.5 + 0.3;
                this.flickerSpeed = Math.random() * 0.05 + 0.02;
                this.time = Math.random() * 100;
                this.y = canvas.height + this.size + Math.random() * 200; // Spawn below screen
              }

              update(scrollY) {
                this.time += this.flickerSpeed;
                this.y -= this.speedY;
                this.x += this.speedX + Math.sin(this.time * 0.5) * 0.5;

                // Parallax effect based on scroll and depth (z)
                const currentY = this.y - scrollY * (this.z * 0.8);

                // Reset if it goes way off top
                if (currentY < -100) {
                  this.reset();
                  // Adjust spawn position relative to scroll to keep them coming seamlessly
                  this.y = canvas.height + scrollY * (this.z * 0.8) + 100;
                }

                return currentY;
              }

              draw(ctx, currentY) {
                const currentOpacity = this.opacity + Math.sin(this.time) * 0.15;
                
                ctx.save();
                ctx.translate(this.x, currentY);
                
                // Slight tilt
                ctx.rotate(Math.sin(this.time * 0.2) * 0.1);

                // Glow
                ctx.shadowBlur = 25 * this.z;
                ctx.shadowColor = `rgba(255, 170, 50, ${currentOpacity})`;

                // Lantern Body
                const gradient = ctx.createLinearGradient(0, -this.size, 0, this.size);
                gradient.addColorStop(0, `rgba(255, 215, 0, ${currentOpacity + 0.2})`); // Bright top
                gradient.addColorStop(1, `rgba(255, 100, 0, ${currentOpacity})`); // Orange bottom

                ctx.fillStyle = gradient;
                ctx.beginPath();
                // Drawing a soft rectangle with slightly curved top/bottom
                ctx.moveTo(-this.size / 2, -this.size);
                ctx.quadraticCurveTo(0, -this.size - 5, this.size / 2, -this.size);
                ctx.lineTo(this.size / 2, this.size);
                ctx.quadraticCurveTo(0, this.size + 5, -this.size / 2, this.size);
                ctx.closePath();
                ctx.fill();

                // Inner flame
                ctx.shadowBlur = 10;
                ctx.shadowColor = 'rgba(255, 255, 255, 0.8)';
                ctx.fillStyle = `rgba(255, 255, 200, ${currentOpacity + 0.4})`;
                ctx.beginPath();
                ctx.arc(0, this.size * 0.4, this.size * 0.2, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
              }
            }

            // Firefly Class
            class Firefly {
              constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = (Math.random() - 0.5) * 1;
                this.speedY = (Math.random() - 0.5) * 1;
                this.time = Math.random() * 100;
              }
              update() {
                this.time += 0.05;
                this.x += this.speedX + Math.sin(this.time) * 0.5;
                this.y += this.speedY + Math.cos(this.time) * 0.5;
                if (this.x < 0) this.x = canvas.width;
                if (this.x > canvas.width) this.x = 0;
                if (this.y < 0) this.y = canvas.height;
                if (this.y > canvas.height) this.y = 0;
              }
              draw(ctx) {
                const alpha = Math.abs(Math.sin(this.time)) * 0.8;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 220, 100, ${alpha})`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = 'rgba(255, 220, 100, 1)';
                ctx.fill();
              }
            }

            // Initialize particles
            for (let i = 0; i < 40; i++) lanterns.push(new Lantern());
            for (let i = 0; i < 60; i++) fireflies.push(new Firefly());

            // Render loop
            const render = () => {
              const scrollY = window.scrollY;
              
              // Clear canvas with a slightly transparent fill to create a smooth trailing/glow effect
              ctx.clearRect(0, 0, canvas.width, canvas.height);

              // Increase density slightly based on scroll depth
              const extraLanterns = Math.floor(scrollY / 500);
              if (lanterns.length < 40 + extraLanterns && lanterns.length < 80) {
                lanterns.push(new Lantern());
              }

              fireflies.forEach((firefly) => {
                firefly.update();
                firefly.draw(ctx);
              });

              // Sort lanterns by depth (z) to draw smaller/farther ones first
              lanterns.sort((a, b) => a.z - b.z).forEach((lantern) => {
                const currentY = lantern.update(scrollY);
                lantern.draw(ctx, currentY);
              });

              animationFrameId = requestAnimationFrame(render);
            };

            render();

            return () => {
              window.removeEventListener('resize', resizeCanvas);
              cancelAnimationFrame(animationFrameId);
            };
          }, []);

          return (
            <canvas
              ref={canvasRef}
              className="fixed inset-0 pointer-events-none z-0 w-full h-full"
              style={{ background: 'transparent' }}
            />
          );
        };

        function App() {
          const [heroRef, heroVisible] = useScrollReveal(0.3);
          const [msgRef, msgVisible] = useScrollReveal(0.3);
          const [detailsRef, detailsVisible] = useScrollReveal(0.2);
          const [storyRef, storyVisible] = useScrollReveal(0.3);
          const [familyRef, familyVisible] = useScrollReveal(0.5);

          // Start true to attempt autoplay on load
          const [isPlaying, setIsPlaying] = useState(true);
          const audioRef = useRef(null);

          // Effect to handle playing and pausing the hidden audio element
          useEffect(() => {
            if (audioRef.current) {
              if (isPlaying) {
                audioRef.current.play().catch(error => {
                  console.log("Autoplay blocked by browser:", error);
                  // Fallback: If browser blocks autoplay, update the UI to show it's paused
                  setIsPlaying(false);
                });
              } else {
                audioRef.current.pause();
              }
            }
          }, [isPlaying]);

          return (
            <div className="relative min-h-screen font-sans bg-gradient-to-b from-[#0f1225] via-[#1a1235] to-[#2d123d] text-amber-50 overflow-x-hidden selection:bg-amber-500/30">
              <style dangerouslySetInnerHTML={{__html: `
                @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500&display=swap');
                
                .font-serif { font-family: 'Cinzel', serif; }
                .font-sans { font-family: 'Montserrat', sans-serif; }
                
                .text-glow {
                  text-shadow: 0 0 15px rgba(255, 200, 100, 0.6), 0 0 30px rgba(255, 150, 50, 0.4);
                }
                
                .glass-card {
                  background: rgba(255, 255, 255, 0.03);
                  backdrop-filter: blur(12px);
                  -webkit-backdrop-filter: blur(12px);
                  border: 1px solid rgba(255, 215, 100, 0.15);
                  box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37), inset 0 0 20px rgba(255, 215, 100, 0.05);
                }
              `}} />

              {/* Hidden Audio Player */}
              {/* Note: Replace this  URL with a link to your "I See The Light" mp3 file */}
              <audio 
                ref={audioRef} 
                src="Images/bgaudioinvite.mp3" 
                loop 
              />

              {/* Music Toggle */}
              <button 
                onClick={() => setIsPlaying(!isPlaying)}
                className={`fixed top-6 right-6 z-50 w-12 h-12 rounded-full glass-card flex items-center justify-center transition-all duration-300 hover:scale-110 ${isPlaying ? 'text-amber-200' : 'text-amber-100/50 animate-pulse'}`}
                aria-label="Toggle Music"
              >
                {isPlaying ? (
                  <svg className="w-6 h-6 animate-[pulse_2s_ease-in-out_infinite]" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                ) : (
                  <svg className="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/><line x1="4" y1="4" x2="20" y2="20" stroke="currentColor" strokeWidth="2"/></svg>
                )}
              </button>

              <LanternCanvas />

              <main className="relative z-10">
                
                {/* SCENE 1: HERO */}
                <section 
                  ref={heroRef}
                  className="min-h-screen flex flex-col items-center justify-center px-6 text-center"
                >
                  <div className={`transition-all duration-1000 transform ${heroVisible ? 'opacity-100 translate-y-0 scale-100' : 'opacity-0 translate-y-10 scale-95'} w-full flex flex-col items-center`}>
                    <h2 className="text-amber-200/70 tracking-[0.3em] text-sm md:text-lg uppercase mb-6 font-sans font-light text-center">
                      Join us under the lights
                    </h2>
                    <h1 className="font-serif text-6xl md:text-8xl lg:text-9xl text-amber-100 text-glow mb-8 leading-tight flex flex-col md:flex-row items-center justify-center w-full">
                      <span>Pahuni</span>
                      <span className="text-4xl md:text-6xl text-amber-300 mx-4 my-2 md:my-0">❤️</span>
                      <span>Jatin</span>
                    </h1>
                    <p className="font-sans font-light text-amber-100/60 text-lg md:text-xl tracking-widest mt-8 animate-bounce text-center">
                      Scroll to discover
                    </p>
                    <div className="w-[1px] h-24 bg-gradient-to-b from-amber-200/50 to-transparent mx-auto mt-4"></div>
                  </div>
                </section>

                {/* SCENE 2: INVITATION MESSAGE */}
                <section 
                  ref={msgRef}
                  className="min-h-screen flex flex-col items-center justify-center px-6 relative py-20"
                >
                  {/* Subtle background image blending */}
                  <div className="absolute inset-0 opacity-20 mask-image-gradient flex items-center justify-center pointer-events-none">
                     <img src="Images/proposalbg.jpg" alt="Couple" className="object-cover w-full h-full max-w-4xl max-h-[80vh] rounded-[100px] blur-[2px] mix-blend-overlay" />
                  </div>

                  <div className={`relative max-w-3xl mx-auto text-center transition-all duration-1000 delay-200 transform ${msgVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-16'}`}>
                    <svg className="w-12 h-12 mx-auto text-amber-300/60 mb-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1} d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
                    </svg>
                    <h3 className="font-serif text-3xl md:text-5xl lg:text-6xl text-amber-100 leading-relaxed text-glow">
                      With a heart full of happiness, <br/>
                      <span className="text-2xl md:text-4xl mt-6 block text-amber-200/90 font-light">
                        you are invited to witness the magical beginning of
                      </span>
                    </h3>
                    <p className="font-sans text-xl md:text-2xl mt-10 text-amber-50 tracking-widest uppercase">
                      Pahuni & Jatin
                    </p>
                  </div>
                </section>

                {/* SCENE 3: PROPOSAL / OUR STORY */}
                <section 
                  ref={storyRef}
                  className="min-h-[80vh] flex flex-col items-center justify-center px-6 py-20 relative"
                >
                  <div className={`w-full max-w-5xl mx-auto flex flex-col md:flex-row items-center gap-12 transition-all duration-1000 transform ${storyVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-16'}`}>
                    <div className="w-full md:w-1/2 relative">
                      <div className="absolute inset-0 bg-amber-500/10 blur-2xl rounded-full translate-x-4 translate-y-4"></div>
                      <img 
                        src="Images/image_d9bfcb.jpg" 
                        alt="The Proposal" 
                        className="relative z-10 w-full h-auto rounded-t-full rounded-b-3xl border border-white/10 shadow-[0_0_50px_rgba(255,200,100,0.15)] object-cover"
                      />
                    </div>
                    <div className="w-full md:w-1/2 text-center md:text-left">
                      <h3 className="font-serif text-4xl md:text-5xl text-amber-200 mb-6 text-glow">
                        A Dream Come True
                      </h3>
                      <p className="font-sans font-light text-lg text-amber-100/80 leading-relaxed mb-8">
                        From beachside walks to a promise forever, our journey has been nothing short of magical. As we take this step into our new life, we can't imagine celebrating it without the warmth and blessings of our dearest family and friends.
                      </p>
                    </div>
                  </div>
                </section>

                {/* SCENE 4: DETAILS REVEAL */}
                <section 
                  ref={detailsRef}
                  className="min-h-screen flex items-center justify-center px-6 py-20"
                >
                  <div className={`w-full max-w-2xl mx-auto transition-all duration-1000 delay-300 transform ${detailsVisible ? 'opacity-100 scale-100' : 'opacity-0 scale-95'}`}>
                    <div className="glass-card rounded-[2.5rem] p-10 md:p-16 text-center relative overflow-hidden group">
                      {/* Shimmer effect */}
                      <div className="absolute inset-0 bg-gradient-to-r from-transparent via-amber-100/10 to-transparent -translate-x-full group-hover:animate-[shimmer_2s_infinite] transition-all"></div>
                      
                      <h2 className="font-serif text-4xl md:text-5xl text-amber-200 text-glow mb-12">
                        The Celebration
                      </h2>
                      
                      <div className="space-y-10 font-sans">
                        <div className="flex flex-col items-center">
                          <span className="w-12 h-12 rounded-full bg-amber-900/40 flex items-center justify-center mb-4 border border-amber-500/30">
                            <svg className="w-6 h-6 text-amber-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                          </span>
                          <h4 className="text-xl text-amber-100/70 uppercase tracking-widest text-sm mb-2">When</h4>
                          <p className="text-2xl md:text-3xl text-amber-50 font-medium">22nd June 2026</p>
                        </div>

                        <div className="w-24 h-[1px] bg-amber-200/20 mx-auto"></div>

                        <div className="flex flex-col items-center">
                          <a 
                            href="https://maps.app.goo.gl/ZdzFWgGZRb8LU9Bm9"
                            target="_blank"
                            rel="noopener noreferrer"
                            className="w-12 h-12 rounded-full bg-amber-900/40 flex items-center justify-center mb-4 border border-amber-500/30 hover:bg-amber-800/60 hover:scale-110 transition-all cursor-pointer shadow-[0_0_15px_rgba(255,200,100,0.1)] hover:shadow-[0_0_25px_rgba(255,200,100,0.4)]"
                            title="Open in Google Maps"
                          >
                            <svg className="w-6 h-6 text-amber-300" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5} d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                          </a>
                          <h4 className="text-xl text-amber-100/70 uppercase tracking-widest text-sm mb-2">Where</h4>
                          <p className="text-2xl md:text-3xl text-amber-50 font-medium mb-2">Tivoli Lotus Court Resort&Banquets</p>
                          <p className="text-amber-100/60 text-lg">sec-74<br/>Noida, Uttar Pradesh</p>
                        </div>
                      </div>
                    </div>
                  </div>
                </section>

                {/* SCENE 5: FAMILY DETAILS & FOOTER */}
                <section 
                  ref={familyRef}
                  className="py-24 px-6 relative flex flex-col items-center text-center"
                >
                  <div className={`transition-all duration-1000 transform ${familyVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-10'}`}>
                    <h3 className="font-serif text-2xl md:text-3xl text-amber-200/80 mb-10 italic">
                      With blessings from
                    </h3>
                    <div className="flex flex-col md:flex-row gap-12 md:gap-32 font-sans text-xl md:text-2xl text-amber-100 font-light tracking-wide">
                      <div>
                        <p className="text-amber-300/50 text-sm uppercase tracking-widest mb-2">Bride's Family</p>
                        <p>Telang Family</p>
                      </div>
                      <div className="hidden md:block w-[1px] h-16 bg-amber-200/20"></div>
                      <div>
                        <p className="text-amber-300/50 text-sm uppercase tracking-widest mb-2">Groom's Family</p>
                        <p>Wadhawan Family</p>
                      </div>
                    </div>
                    
                    <div className="mt-32 pb-10">
                       <h1 className="font-serif text-3xl md:text-4xl text-amber-100/40 text-glow">
                        P & J
                      </h1>
                    </div>
                  </div>
                </section>

              </main>

              <style dangerouslySetInnerHTML={{__html: `
                @keyframes shimmer {
                  100% { transform: translateX(100%); }
                }
                .mask-image-gradient {
                  mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
                  -webkit-mask-image: radial-gradient(ellipse at center, black 30%, transparent 70%);
                }
              `}} />
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
